<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Password</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        h2 { color: #1a73e8; margin-bottom: 25px; }
        
        label { display: block; text-align: left; margin-bottom: 8px; font-weight: 600; color: #444; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        
        button { 
            background: #1a73e8; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
        }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🔒 Update Password</h2>
        <form action="/apply_reset" method="POST" onsubmit="return validate()">
            
            <input type="hidden" name="user_id" id="uid">
            
            <label>New Password</label>
            <input type="password" name="new_password" id="p1" placeholder="Enter new password" required>

            <label>Confirm Password</label>
            <input type="password" id="p2" placeholder="Retype password" required>

            <button type="submit">Set New Password</button>
        </form>
    </div>

    <script>
        // 1. Grab the User ID from the URL (sent by main.cpp: ?id=5)
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        // 2. Put it into the hidden input so it gets sent to the backend
        if(id) {
            document.getElementById('uid').value = id;
        } else {
            alert("Error: Invalid Session. Please try answering security questions again.");
            window.location.href = "/ResetPassword.html";
        }

        // 3. Simple Client-Side Validation
        function validate() {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            
            if(p1 !== p2) {
                alert("Passwords do not match!");
                return false;
            }
            // Check for special char (to match your C++ logic)
            const specialChars = /[~`!@#$%^&*()_\-=+\[\]{};:,.<>?]/;
            if(!specialChars.test(p1)) {
                alert("Password must contain at least one special character.");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
