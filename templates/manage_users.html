<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management - Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h2 { color: #1a73e8; margin: 0; }
        .btn-back { background: #eee; color: #333; padding: 8px 15px; border-radius: 5px; text-decoration: none; border: none; cursor: pointer; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        thead { background: #f8f9fa; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { font-weight: 600; color: #5f6368; }
        tr:hover { background: #f1f3f4; }
        
        /* Badges for Roles */
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .badge-Admin { background: #fce8e6; color: #c5221f; }
        .badge-Staff { background: #e8f0fe; color: #1a73e8; }
        .badge-Student { background: #e6f4ea; color: #137333; }
        .badge-Security { background: #feefe3; color: #b06000; } /* Security Staff */
        .badge-Active {background: #feefe3;color: #029017;}
        .badge-Inactive { background: #dc3545; color: white; }

        /* Edit Button */
        .btn-edit { background: #1a73e8; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-edit:hover { background: #1557b0; }

        /* Modal (Popup) Styling */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 10px; width: 400px; animation: popIn 0.3s; }
        @keyframes popIn { from {transform: scale(0.8); opacity: 0;} to {transform: scale(1); opacity: 1;} }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #eee; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-save { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>👥 User Management</h2>
        <button class="btn-back" onclick="window.history.back()">Back to Dashboard</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
            </tbody>
    </table>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit User Profile</h3>
        <input type="hidden" id="editId">
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="editEmail">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" id="editPhone">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="editRole" disabled style="background-color: #e9ecef; cursor: not-allowed;">
                <option value="Student">Student</option>
                <option value="Staff">Staff</option>
                <option value="Security Staff">Security Staff</option>
                <option value="Admin">Admin</option>
            </select>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select id="editStatus">
                <option value="Active">Active</option>
                <option value="InActive">InActive</option>
            </select>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveChanges()">Save Changes</button>
        </div>
    </div>
</div>

<script>
    // 1. Load Data on Page Start
    loadUsers();

    async function loadUsers() {
        try {
            const resp = await fetch('/api/get_all_users');
            if(!resp.ok){
                alert('Error: Unable to Load User List.');
                return;
            }
            const users = await resp.json();
            if(users.length == 0){
                alert('Error: No user records in system.');
                return;
            }
            const tbody = document.getElementById('userTableBody');
            
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>#${u.id}</td>
                    <td><strong>${u.name}</strong></td>
                    <td>${u.email}</td>
                    <td><span class="badge badge-${u.role.split(' ')[0]}">${u.role}</span></td>
                    <td><span class="badge badge-${u.role.split(' ')[0]}">${u.status}</span></td>
                    <td>${u.phone}</td>
                    <td>
                        <button class="btn-edit" onclick="openEditModal('${u.id}', '${u.name}', '${u.email}', '${u.role}', '${u.phone}', '${u.status}')">Edit</button>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            console.error(err);
        }
    }

    // 2. Modal Logic
    const modal = document.getElementById('editModal');

    function openEditModal(id, name, email, role, phone, status) {
        document.getElementById('editId').value = id;
        document.getElementById('editName').value = name;
        document.getElementById('editEmail').value = email;
        document.getElementById('editRole').value = role;
        document.getElementById('editPhone').value = phone;
        document.getElementById('editStatus').value = status;
        
        // --- NEW LOGIC: Lock Status for Non-Students ---
        const statusField = document.getElementById('editStatus');
        
        if (role === 'Student') {
            statusField.disabled = false; // Allow editing
            statusField.style.backgroundColor = "white";
        } else {
            statusField.value = "Active"; // Force visual default
            statusField.disabled = true;  // Block editing
            statusField.style.backgroundColor = "#e9ecef"; // Grey out
        }
        // ----------------------------------------------

        document.getElementById('editModal').style.display = 'flex';
    }

    async function saveChanges() {
        const id = document.getElementById('editId').value;
        const name = document.getElementById('editName').value;
        const email = document.getElementById('editEmail').value;
        const role = document.getElementById('editRole').value;
        const phone = document.getElementById('editPhone').value;
        
        // Even if disabled, we grab the value (it will default to Active)
        const status = document.getElementById('editStatus').value; 

        // Add &status=${status} to the URL
        const url = `/api/admin_update_user?id=${id}&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&role=${encodeURIComponent(role)}&phone=${encodeURIComponent(phone)}&status=${encodeURIComponent(status)}`;

        const resp = await fetch(url, { method: 'POST' });
        
        if (resp.ok) {
            alert("User updated successfully!");
            closeModal();
            loadUsers(); 
        } else {
            alert("Failed to update user.");
        }
    }

    function closeModal() {
        modal.style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            closeModal();
        }
    }
</script>

</body>
</html>
